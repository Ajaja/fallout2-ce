name: Release

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  android:
    name: Android

    runs-on: ubuntu-latest

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11
          cache: gradle

      - name: Cache cmake build
        uses: actions/cache@v4
        with:
          path: os/android/app/.cxx
          key: android-cmake-v1

      - name: Setup signing config
        if: env.KEYSTORE_FILE_BASE64 != '' && env.KEYSTORE_PROPERTIES_FILE_BASE64 != ''
        run: |
          cd os/android
          echo "$KEYSTORE_FILE_BASE64" | base64 --decode > release.keystore
          echo "$KEYSTORE_PROPERTIES_FILE_BASE64" | base64 --decode > release-keystore.properties
        env:
          KEYSTORE_FILE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_FILE_BASE64 }}
          KEYSTORE_PROPERTIES_FILE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PROPERTIES_FILE_BASE64 }}

      - name: Build
        run: |
          cd os/android
          ./gradlew assembleRelease

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fallout2ce-android
          path: os/android/app/build/outputs/apk/release/
          if-no-files-found: error
      
  windows:
    name: Windows (${{ matrix.arch }})

    runs-on: windows-latest

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Cache cmake build
        uses: actions/cache@v4
        with:
          path: build
          key: windows-x64-cmake-v1

      - name: Configure
        run: |
          cmake \
            -B build \
            -A x64 \
            # EOL

      - name: Build
        run: |
          cmake \
            --build build \
            --config Release \
            # EOL

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fallout2ce-win-x64
          path: build/Release/
          if-no-files-found: error
